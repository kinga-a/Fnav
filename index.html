<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" type="image/x-icon" href="https://pan.y11.fun/api/images/fnav_favicon.png">
<link rel="apple-touch-icon" href="https://pan.y11.fun/api/images/fnav_favicon.png">
<title>Fnav</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    /* 主色调柔和靛蓝，低饱和高级感 */
    --primary: #4361ee;
    --primary-light: #4895ef;
    --primary-hover: #3a54d6;
    --primary-glow: rgba(67, 97, 238, 0.12);
    --danger: #f72585;
    --danger-light: rgba(247, 37, 133, 0.12);
    --success: #06d6a0;
    --success-light: rgba(6, 214, 160, 0.12);
    --warning: #ffd166;
    --warning-dark: #e6b84e;
    --warning-light: rgba(255, 209, 102, 0.15);

    /* 中性分层色彩 护眼柔和 */
    --bg: #f7f9fc;
    --card-bg: #ffffff;
    --sidebar-bg: #1d2b41;
    --sidebar-hover: rgba(255,255,255,0.06);
    --sidebar-active: rgba(67, 97, 238, 0.18);
    --sidebar-text: #cbd5e1;
    --sidebar-muted: #94a3b8;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;

    /* 统一阴影层级 */
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
    --shadow-md: 0 2px 8px rgba(15, 23, 42, 0.08);
    --shadow-lg: 0 10px 25px -5px rgba(15, 23, 42, 0.1), 0 4px 10px -3px rgba(15, 23, 42, 0.06);
    --shadow-fab: 0 6px 18px rgba(67, 97, 238, 0.3);

    /* 统一圆角梯度 */
    --radius-xs: 4px;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --radius-full: 9999px;

    /* 过渡统一 */
    --trans-base: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.55;
  }
  .app-layout { display: flex; min-height: 100vh; }
  /* 侧边栏 */
  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    position: fixed;
    left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
    transition: var(--trans-base);
    z-index: 1000;
    overflow-y: auto;
    padding: 1.75rem 1.25rem;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 999;
    opacity: 0; visibility: hidden;
    transition: var(--trans-base);
    backdrop-filter: blur(2px);
  }
  .sidebar-overlay.open { opacity: 1; visibility: visible; }
  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-title { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
  .sidebar-close {
    background: none; border: none; color: var(--sidebar-muted);
    font-size: 1.6rem; cursor: pointer; padding: 0.3rem;
    border-radius: var(--radius-sm);
    transition: var(--trans-base);
  }
  .sidebar-close:hover { color: #fff; background: var(--sidebar-hover); }
  .nav-section { margin-bottom: 2rem; }
  .nav-label-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.85rem;
    padding-left: 0.75rem;
  }
  .nav-label {
    font-size: 0.725rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--sidebar-muted);
    font-weight: 500;
  }
  /* 侧边新建分类圆形按钮 */
  .cat-add-btn {
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--sidebar-hover);
    border: none;
    color: var(--sidebar-muted);
    border-radius: var(--radius-full);
    cursor: pointer;
    font-size: 17px;
    line-height: 1;
    transition: var(--trans-base);
    align-self: center;
  }
  .cat-add-btn:hover {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 0 0 3px var(--primary-glow);
  }
  .nav-item {
    display: flex; align-items: center; gap: 0.85rem;
    padding: 0.725rem 0.85rem;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--trans-base);
    color: var(--sidebar-text);
    text-decoration: none;
    font-size: 0.95rem;
    margin-bottom: 0.25rem;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
  .nav-item.active {
    background: var(--sidebar-active);
    color: #fff;
  }
  .nav-item .icon { width: 20px; text-align: center; font-size: 1.05rem; }
  .nav-item .count {
    margin-left: auto;
    background: rgba(255,255,255,0.1);
    padding: 0.15rem 0.6rem;
    border-radius: var(--radius-full);
    font-size: 0.725rem;
    color: var(--sidebar-muted);
  }
  .category-list { margin-left: 0.5rem; }
  .category-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.65rem 0.85rem 0.65rem 2rem;
    border-radius: var(--radius-sm);
    cursor: grab;
    font-size: 0.9rem;
    color: var(--sidebar-text);
    transition: var(--trans-base);
    user-select: none;
    margin-bottom: 0.2rem;
  }
  .category-item:active { cursor: grabbing; }
  .category-item:hover { color: #fff; background: var(--sidebar-hover); }
  .category-item.active {
    color: #fff;
    background: var(--sidebar-active);
  }
  .category-item .cat-color {
    width: 9px; height: 9px; border-radius: var(--radius-full);
    flex-shrink: 0;
  }
  .cat-text { flex:1; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cat-count { font-size: 0.725rem; opacity: 0.65; margin-right:6px; }
  .cat-del-btn {
    background: transparent; border:none; color:var(--sidebar-muted);
    width:20px; height:20px; border-radius:var(--radius-xs);
    font-size:15px; cursor:pointer; display:none;
    transition: var(--trans-base);
  }
  .category-item:hover .cat-del-btn { display:flex; align-items:center; justify-content:center; }
  .cat-del-btn:hover { background:var(--danger-light); color:var(--danger); }

  .main-content {
    flex: 1;
    margin-left: 0;
    transition: var(--trans-base);
    min-height: 100vh;
  }
  /* 顶部导航栏 */
  .top-bar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 28px;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .menu-btn {
    background: none; border: none;
    font-size: 1.6rem; cursor: pointer;
    color: var(--text); padding: 0.3rem;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    transition: var(--trans-base);
  }
  .menu-btn:hover { background: var(--bg); color: var(--primary); }
  .search-box {
    flex: 1;
    max-width: 650px;
    margin: 0 auto;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 0.725rem 1rem 0.725rem 2.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 0.95rem;
    background: var(--bg);
    transition: var(--trans-base);
  }
  .search-box input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-glow);
    background: #fff;
  }
  .search-box .search-icon {
    position: absolute;
    left: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 1.05rem;
  }
  .top-actions {
    display: flex; gap: 0.75rem;
  }
  /* 通用按钮样式统一 */
  .btn {
    display: inline-flex; align-items: center; gap: 0.55rem;
    padding: 0.6rem 1.1rem;
    border-radius: var(--radius-sm);
    font-size: 0.9rem; font-weight: 500;
    cursor: pointer; border: none;
    transition: var(--trans-base);
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff;
    box-shadow: 0 3px 8px var(--primary-glow);
  }
  .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg); color: var(--text); border-color: var(--text-light); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #e01e76; transform: translateY(-1px); }
  .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.825rem; }
  .content-area {
    padding: 2.25rem 28px;
    max-width: 1520px;
    margin: 0 auto;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
  }
  .section-title { font-size: 1.6rem; font-weight: 700; color: var(--text); }
  .section-desc { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; }

  #bookmarkGrid {
    display: block;
  }
  .bookmark-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 1.25rem;
    margin-bottom: 36px;
    transition: var(--trans-base);
  }
  .bookmark-grid.hidden {
    display: none;
    opacity: 0;
    height: 0;
    margin-bottom: 0;
  }
  .category-group-title {
    margin: 36px 0 14px;
    font-size: 19px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .category-group-title:first-child {
    margin-top: 0;
  }
  .category-group-title .dot {
    width:13px;height:13px;border-radius:var(--radius-full);
  }
  .category-group-title .count-text {
    font-size:14px;color:var(--text-muted);font-weight:normal;
    margin-left: auto 10px;
  }

  /* ========== 三横线折叠开关优化 ========== */
  .menu-toggle-wrap {
    flex-shrink: 0;
    cursor: pointer;
  }
  #checkbox {
    display: none;
  }
  .toggle {
    position: relative;
    width: 34px;
    cursor: pointer;
    margin: auto;
    display: block;
    height: calc(4px * 3 + 10px * 2);
  }
  .bar {
    position: absolute;
    left: 0;
    right: 0;
    height: 4px;
    border-radius: calc(4px / 2);
    background: var(--primary);
    color: inherit;
    opacity: 1;
    transition: none 0.35s cubic-bezier(.5,-0.35,.35,1.5) 0s;
  }
  .bar--top {
    bottom: calc(50% + 10px + 4px/ 2);
    transition-property: bottom,margin,transform;
    transition-delay: calc(0s + 0.35s),0s,0s;
  }
  .bar--middle {
    top: calc(50% - 4px/ 2);
    transition-property: top,opacity;
    transition-duration: 0.35s,0s;
    transition-delay: calc(0s + 0.35s * 1.3),calc(0s + 0.35s * 1.3);
  }
  .bar--bottom {
    top: calc(50% + 10px + 4px/ 2);
    transition-property: top,transform;
    transition-delay: 0s;
  }
  #checkbox:checked + .toggle .bar--top {
    bottom: calc(50% - 10px - 4px);
    margin-bottom: calc(10px + 4px/ 2);
    transform: rotate(45deg);
    transition-delay: calc(0s + 0.35s * .3),calc(0s + 0.35s * 1.3),calc(0s + 0.35s * 1.3);
  }
  #checkbox:checked + .toggle .bar--middle {
    top: calc(50% + 10px);
    opacity: 0;
    transition-duration: 0.35s,0s;
    transition-delay: 0s,calc(0s + 0.35s);
  }
  #checkbox:checked + .toggle .bar--bottom {
    top: calc(50% - 4px/ 2);
    transform: rotate(-45deg);
    transition-delay: calc(0s + 0.35s * 1.3),calc(0s + 0.35s * 1.3);
  }

  /* 书签卡片核心美化 */
  .bookmark-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.6rem;
    box-shadow: var(--shadow-sm);
    transition: var(--trans-base);
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }
  .bookmark-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-4px) scale(1.01);
    border-color: var(--border-light);
  }
  .bookmark-card.pinned {
    border-left: 5px solid var(--warning);
  }
  .bookmark-card.private {
    border-left: 5px solid var(--primary);
  }
  .bookmark-card.private-locked {
    border-left: 5px solid var(--danger);
    opacity: 0.72;
    cursor: default;
  }
  .bookmark-card.private-locked .card-title,
  .bookmark-card.private-locked .card-desc,
  .bookmark-card.private-locked .card-link {
    filter: blur(4px);
    user-select: none;
  }
  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 0.9rem;
  }
  .card-title {
    font-size: 1.05rem; font-weight: 600;
    color: var(--text); word-break: break-word;
    padding-right: 0.6rem;
  }
  .card-badges { display: flex; gap: 0.45rem; flex-shrink: 0; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center;
    padding: 0.18rem 0.6rem;
    border-radius: var(--radius-full);
    font-size: 0.7rem; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-pinned { background: var(--warning-light); color: #92400e; }
  .badge-private { background: var(--primary-glow); color: var(--primary-hover); }
  .badge-category {
    background: var(--bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .card-desc {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 1.1rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-link {
    display: inline-flex; align-items: center; gap: 0.45rem;
    color: var(--primary);
    font-size: 0.9rem; font-weight: 500;
    text-decoration: none;
    word-break: break-all;
    transition: var(--trans-base);
  }
  .card-link:hover { text-decoration: underline; color: var(--primary-hover); }
  .card-actions {
    display: flex; gap: 0.45rem;
    opacity: 0;
    transition: var(--trans-base);
  }
  .bookmark-card:hover .card-actions { opacity: 1; }
  .card-actions button {
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer; padding: 0.3rem;
    border-radius: var(--radius-xs);
    transition: var(--trans-base);
    font-size: 1rem;
  }
  .card-actions button:hover { background: var(--bg); color: var(--text); }
  .card-actions button.delete:hover { color: var(--danger); background: var(--danger-light); }
  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text-muted);
    width:100%;
  }
  .empty-state .icon { font-size: 3.5rem; margin-bottom: 1.2rem; opacity: 0.35; }
  .empty-state h3 { font-size: 1.35rem; color: var(--text); margin-bottom: 0.6rem; font-weight: 600; }
  .empty-state p { font-size: 0.95rem; max-width: 420px; margin: 0 auto; }

  /* 弹窗通用 */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.58);
    backdrop-filter: blur(4px);
    z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: var(--trans-base);
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    box-sizing: border-box;
  }
  .modal-overlay.open { opacity: 1; visibility: visible; }
  .modal {
    background: var(--card-bg);
    border-radius: var(--radius-xl);
    width: 92%; max-width: 540px;
    max-height: 84vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    transform: scale(0.94) translateY(8px);
    transition: var(--trans-base);
    margin:14px 0;
    overflow:hidden;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-header {
    padding: 1.4rem 1.75rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 1.2rem; font-weight: 600; color: var(--text); }
  .modal-close {
    background: none; border: none;
    font-size: 1.6rem; color: var(--text-muted);
    cursor: pointer;
    border-radius: var(--radius-xs);
    padding: 0.2rem 0.4rem;
    transition: var(--trans-base);
  }
  .modal-close:hover { background: var(--bg); color: var(--text); }
  .modal-body { padding: 1.75rem; }
  .form-group { margin-bottom: 1.4rem; }
  .form-label {
    display: block;
    font-size: 0.9rem; font-weight: 500;
    margin-bottom: 0.45rem;
  }
  .form-label .required { color: var(--danger); }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 0.725rem 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 0.95rem;
    background: var(--bg);
    transition: var(--trans-base);
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-glow);
    background: #fff;
  }
  .form-textarea { resize: vertical; min-height: 90px; }
  .form-hint { font-size: 0.825rem; color: var(--text-muted); margin-top: 0.3rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  .checkbox-group {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 0;
  }
  .checkbox-group input[type="checkbox"] {
    width: 1.25rem; height: 1.25rem;
    accent-color: var(--primary);
    cursor: pointer;
  }
  .checkbox-group label { cursor: pointer; font-size: 0.9rem; }
  .modal-footer {
    padding: 1.2rem 1.75rem 1.75rem;
    display: flex; justify-content: flex-end; gap: 0.9rem;
  }
  .auth-modal .modal { max-width: 420px; text-align: center; }
  .auth-modal .modal-body { padding: 2.25rem; }
  .auth-icon { font-size: 3.6rem; margin-bottom: 1.3rem; opacity:0.85; }
  .auth-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.6rem; }
  .auth-desc { color: var(--text-muted); margin-bottom: 1.75rem; font-size:0.95rem; }
  .auth-input {
    width: 100%;
    padding: 0.85rem 1.1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    margin-bottom: 1.2rem;
    text-align: center;
    background: var(--bg);
    transition: var(--trans-base);
  }
  .auth-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-glow);
    background: #fff;
  }
  .auth-error {
    color: var(--danger);
    font-size: 0.9rem;
    margin-bottom: 1.2rem;
    min-height: 1.3rem;
  }
  /* Toast提示 */
  .toast-container {
    position: fixed;
    bottom: 1.75rem; right: 1.75rem;
    z-index: 3000;
    display: flex; flex-direction: column; gap: 0.7rem;
  }
  .toast {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem 1.4rem;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 0.9rem;
    animation: slideIn 0.32s ease;
    min-width: 300px;
  }
  .toast.success { border-left: 5px solid var(--success); }
  .toast.error { border-left: 5px solid var(--danger); }
  .toast.info { border-left: 5px solid var(--primary); }
  @keyframes slideIn {
    from { transform: translateX(110%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .loading-spinner {
    display: inline-block;
    width: 1.6rem; height: 1.6rem;
    border: 2.5px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 右下角浮动按钮 */
  .fab-add-bookmark {
    position: fixed;
    right: 28px;
    bottom: 28px;
    width: 60px;
    height: 60px;
    border-radius: var(--radius-full);
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff;
    border: none;
    font-size: 30px;
    line-height: 1;
    box-shadow: var(--shadow-fab);
    cursor: pointer;
    z-index: 900;
    transition: var(--trans-base);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .fab-add-bookmark:hover {
    background: var(--primary-hover);
    transform: translateY(-5px) scale(1.04);
    box-shadow: 0 10px 24px rgba(67, 97, 238, 0.42);
  }
  .fab-add-bookmark:active {
    transform: translateY(0) scale(0.97);
  }
  /* 防止移动端自动放大输入框 */
  input,
  textarea,
  select {
    font-size: 16px !important;
    -webkit-text-size-adjust: 100%;
  }
  @supports (-webkit-touch-callout: none) {
    .form-hint {
      font-size: 14px;
    }
  }
  /* 移动端响应式重写 */
  @media (max-width: 768px) {
    .bookmark-grid { 
      grid-template-columns: 1fr; 
      gap: 0.9rem;
      margin-bottom:24px;
    }
    .bookmark-card {
      padding: 1.1rem;
      border-radius: var(--radius-md);
    }
    .card-title {
      font-size: 0.95rem;
    }
    .card-desc {
      font-size: 0.85rem;
      -webkit-line-clamp: 1;
      margin-bottom: 0.7rem;
    }
    .card-link {
      font-size: 0.85rem;
    }
    .badge {
      font-size: 0.65rem;
      padding: 0.12rem 0.4rem;
    }
    .form-row { grid-template-columns: 1fr; }
    .top-bar { padding: 1rem 16px; gap:0.8rem; }
    .search-box { max-width: none; }
    .content-area { padding: 1.5rem 16px; }
    .fab-add-bookmark {
      width: 54px;
      height: 54px;
      right: 20px;
      bottom: 20px;
      font-size: 26px;
    }
    .section-title { font-size:1.4rem; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">📚 书签管理</span>
      <button class="sidebar-close" onclick="app.toggleSidebar()">&times;</button>
    </div>
    <div class="nav-section">
      <div class="nav-label">视图</div>
      <a class="nav-item" data-view="all" onclick="app.setView('all')">
        <span class="icon">🏠</span> 全部书签
        <span class="count" id="countAll">0</span>
      </a>
      <a class="nav-item" data-view="pinned" onclick="app.setView('pinned')">
        <span class="icon">📌</span> 置顶书签
        <span class="count" id="countPinned">0</span>
      </a>
      <a class="nav-item" data-view="private" onclick="app.setView('private')" id="navPrivate" style="display:none">
        <span class="icon">🔒</span> 私有书签
        <span class="count" id="countPrivate">0</span>
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-label-wrap">
        <span class="nav-label">分类（可拖动排序）</span>
        <button class="cat-add-btn" id="addCategoryBtn" onclick="app.showAddCategory()">+</button>
      </div>
      <div id="categoryList" class="category-list"></div>
    </div>
    <div class="nav-section" style="margin-top: auto; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,0.1);">
      <div class="nav-item" onclick="app.toggleAuth()">
        <span class="icon" id="authIcon">🔓</span>
        <span id="authStatus">未验证</span>
      </div>
    </div>
  </aside>
  <div class="main-content">
    <div class="top-bar">
      <button class="menu-btn" onclick="app.toggleSidebar()">☰</button>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索书签标题、链接、描述..." oninput="app.handleSearch(this.value)">
      </div>
      <div class="top-actions" id="topActions"></div>
    </div>
    <div class="content-area">
      <div class="section-header">
        <div>
          <h1 class="section-title" id="pageTitle">全部书签</h1>
          <p class="section-desc" id="pageDesc">浏览所有书签</p>
        </div>
      </div>
      <div id="bookmarkGrid"></div>
    </div>
  </div>
</div>
<button class="fab-add-bookmark" id="fabAddBtn" onclick="app.showAddModal()">+</button>
<div class="modal-overlay" id="bookmarkModal" onclick="app.closeModalByOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">新建书签</h3>
      <button class="modal-close" onclick="app.closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="bookmarkForm" onsubmit="app.saveBookmark(event)">
        <input type="hidden" id="bookmarkId">
        <div class="form-group">
          <label class="form-label">标题 <span class="required">*</span></label>
          <input type="text" class="form-input" id="formTitle" required placeholder="输入书签标题">
        </div>
        <div class="form-group">
          <label class="form-label">链接 <span class="required">*</span></label>
          <input type="url" class="form-input" id="formUrl" required placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label class="form-label">描述</label>
          <textarea class="form-textarea" id="formDesc" placeholder="可选：添加描述..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">分类</label>
          <select class="form-select" id="formCategory"></select>
          <div class="form-hint">如需新增分类，请在侧边栏分类旁「+」</div>
        </div>
        <div class="form-row">
          <div class="checkbox-group">
            <input type="checkbox" id="formPinned">
            <label for="formPinned">📌 置顶</label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="formPrivate">
            <label for="formPrivate">🔒 私有</label>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="app.closeModal()">取消</button>
      <button class="btn btn-primary" onclick="app.saveBookmark()">保存</button>
    </div>
  </div>
</div>
<div class="modal-overlay auth-modal" id="authModal" onclick="app.closeAuthModalByOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-body">
      <div class="auth-icon">🔐</div>
      <h3 class="auth-title">访问私有书签</h3>
      <p class="auth-desc">请输入密码以查看私有书签内容</p>
      <input type="password" class="auth-input" id="authPassword" placeholder="输入密码" onkeydown="if(event.key==='Enter')app.doAuth()">
      <div class="auth-error" id="authError"></div>
      <button class="btn btn-primary" style="width:100%" onclick="app.doAuth()">验证</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="categoryModal" onclick="app.closeCategoryModalByOverlay(event)">
  <div class="modal" style="max-width: 400px;" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">新建分类</h3>
      <button class="modal-close" onclick="app.closeCategoryModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">分类名称</label>
        <input type="text" class="form-input" id="newCategoryName" placeholder="输入分类名称" onkeydown="if(event.key==='Enter')app.addCategory()">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="app.closeCategoryModal()">取消</button>
      <button class="btn btn-primary" onclick="app.addCategory()">创建</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="deleteModal" onclick="app.closeDeleteModalByOverlay(event)">
  <div class="modal" style="max-width: 400px;" onclick="event.stopPropagation()">
    <div class="modal-body" style="text-align:center; padding: 2rem;">
      <div style="font-size: 3rem; margin-bottom: 1rem;">🗑️</div>
      <h3 style="margin-bottom: 0.5rem;">确认删除?</h3>
      <p style="color: var(--text-muted); margin-bottom: 1.5rem;">此操作无法撤销</p>
      <div style="display: flex; gap: 0.75rem; justify-content: center;">
        <button class="btn btn-ghost" onclick="app.closeDeleteModal()">取消</button>
        <button class="btn btn-danger" onclick="app.confirmDelete()">删除</button>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
const API_BASE = '/api';
class BookmarkApp {
  constructor() {
    this.bookmarks = [];
    this.categories = [];
    this.currentView = 'all';
    this.searchQuery = '';
    this.isAuthenticated = false;
    this.authToken = localStorage.getItem('bookmark_auth') || '';
    this.deleteTarget = null;
    this.sidebarOpen = false;
    this.dragItem = null;
    this.foldState = {}; // key:分类名 true=收起(勾选) false=展开(未勾选)
    if (this.authToken) this.isAuthenticated = true;
    this.init();
  }
  async init() {
    await this.loadData();
    this.renderCategories();
    this.renderBookmarks();
    this.updateAuthUI();
    document.getElementById('sidebarOverlay').addEventListener('click', () => this.toggleSidebar());
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        this.closeModal(); this.closeAuthModal(); this.closeCategoryModal(); this.closeDeleteModal();
        if (this.sidebarOpen) this.toggleSidebar();
      }
      if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
      if (e.ctrlKey && e.key === 'n') { e.preventDefault(); this.showAddModal(); }
    });
  }
  async loadData() {
    try {
      const [bookmarksRes, categoriesRes] = await Promise.all([
        fetch(API_BASE + '/bookmarks', { headers: this.authHeaders() }),
        fetch(API_BASE + '/categories')
      ]);
      if (bookmarksRes.ok) { const data = await bookmarksRes.json(); this.bookmarks = data.bookmarks || []; }
      if (categoriesRes.ok) { const data = await categoriesRes.json(); this.categories = data.categories || ['未分类']; }
    } catch (e) { this.showToast('加载数据失败', 'error'); console.error(e); }
  }
  get authHeaders() {
    return () => {
      const headers = {
        "Content-Type": "application/json"
      };
      if (this.authToken) {
        headers["Authorization"] = `Bearer ${this.authToken}`;
      }
      return headers;
    };
  }
  toggleSidebar() {
    this.sidebarOpen = !this.sidebarOpen;
    document.getElementById('sidebar').classList.toggle('open', this.sidebarOpen);
    document.getElementById('sidebarOverlay').classList.toggle('open', this.sidebarOpen);
  }
  setView(view) {
    this.currentView = view;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
    const viewMap = {
      'all': { title: '全部书签', desc: '浏览所有书签' },
      'pinned': { title: '置顶书签', desc: '查看置顶的书签' },
      'private': { title: '私有书签', desc: '查看私有书签' }
    };
    if (viewMap[view]) {
      document.querySelector(`[data-view="${view}"]`).classList.add('active');
      document.getElementById('pageTitle').textContent = viewMap[view].title;
      document.getElementById('pageDesc').textContent = viewMap[view].desc;
    } else {
      document.getElementById('pageTitle').textContent = view;
      document.getElementById('pageDesc').textContent = `${view} 分类下的书签`;
    }
    this.renderBookmarks();
    if (window.innerWidth < 768) this.toggleSidebar();
  }
  handleSearch(query) {
    this.searchQuery = query.toLowerCase().trim();
    this.renderBookmarks();
  }
  getFilteredBookmarks() {
    let filtered = this.bookmarks;
    if (this.currentView === 'pinned') filtered = filtered.filter(b => b.pinned);
    else if (this.currentView === 'private') filtered = filtered.filter(b => b.isPrivate);
    else if (this.categories.includes(this.currentView)) filtered = filtered.filter(b => b.category === this.currentView);
    if (this.searchQuery) {
      filtered = filtered.filter(b =>
        b.title.toLowerCase().includes(this.searchQuery) ||
        b.url.toLowerCase().includes(this.searchQuery) ||
        (b.description && b.description.toLowerCase().includes(this.searchQuery))
      );
    }
    return filtered.sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
  }
  toggleFold(catName) {
    this.foldState[catName] = !this.foldState[catName];
    this.renderBookmarks();
  }
  renderBookmarks() {
    const wrap = document.getElementById('bookmarkGrid');
    wrap.innerHTML = '';
    const filtered = this.getFilteredBookmarks();
    document.getElementById('countAll').textContent = this.bookmarks.length;
    document.getElementById('countPinned').textContent = this.bookmarks.filter(b => b.pinned).length;
    document.getElementById('countPrivate').textContent = this.bookmarks.filter(b => b.isPrivate).length;
    const groupMap = {};
    filtered.forEach(item => {
      const catName = item.category || '未分类';
      if (!groupMap[catName]) groupMap[catName] = [];
      groupMap[catName].push(item);
    });
    const sortedGroups = [];
    this.categories.forEach(cat => {
      if (groupMap[cat]) sortedGroups.push({ name: cat, list: groupMap[cat] });
      delete groupMap[cat];
    });
    Object.keys(groupMap).forEach(cat => {
      sortedGroups.push({ name: cat, list: groupMap[cat] });
    });
    if (sortedGroups.length === 0) {
      wrap.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>暂无书签</h3><p>登录后点击右下角加号添加第一个书签</p></div>`;
      return;
    }
    let html = '';
    sortedGroups.forEach(group => {
      const { name, list } = group;
      const color = this.getCategoryColor(name);
      const isFold = this.foldState[name] || false;
      html += `<div class="category-group-wrap" data-cat="${this.escapeHtml(name)}">
        <h2 class="category-group-title">
          <span class="dot" style="background:${color}"></span>
          ${this.escapeHtml(name)}
          <!-- 新三横线开关结构 -->
          <div class="menu-toggle-wrap" onclick="app.toggleFold('${this.escapeHtml(name)}')">
            <div id="menuToggle">
              <input id="checkbox" type="checkbox" ${isFold ? 'checked' : ''}>
              <label class="toggle" for="checkbox">
                <div class="bar bar--top"></div>
                <div class="bar bar--middle"></div>
                <div class="bar bar--bottom"></div>
              </label>
            </div>
          </div>
          <span class="count-text">(${list.length})</span>
        </h2>
        <div class="bookmark-grid ${isFold ? 'hidden' : ''}">`;
      list.forEach(b => {
        html += this.createBookmarkCard(b);
      });
      html += `</div></div>`;
    });
    wrap.innerHTML = html;
  }
  createBookmarkCard(b) {
    const isLocked = b.isPrivate && !this.isAuthenticated;
    const categoryColor = this.getCategoryColor(b.category);
    let actionHtml = '';
    if (!isLocked) {
      actionHtml = `<div class="card-actions">
        <button onclick="event.stopPropagation();app.editBookmark('${b.id}')" title="编辑">✏️</button>
        <button class="delete" onclick="event.stopPropagation();app.deleteBookmark('${b.id}')" title="删除">🗑️</button>
      </div>`;
    }
    const clickEvent = isLocked ? '' : `onclick="window.open('${this.escapeHtml(b.url)}','_blank')"`;
    if (isLocked) {
      return `<div class="bookmark-card ${b.pinned ? 'pinned' : ''} ${b.isPrivate ? 'private' : ''} private-locked" data-id="${b.id}" ${clickEvent}>
      <div class="card-header"><h3 class="card-title">${this.escapeHtml(b.title)}</h3>
        <div class="card-badges">${b.pinned ? '<span class="badge badge-pinned">📌</span>' : ''}${b.isPrivate ? '<span class="badge badge-private">🔒</span>' : ''}<span class="badge badge-category" style="border-color: ${categoryColor}33; color: ${categoryColor}">${this.escapeHtml(b.category || '未分类')}</span></div>
      </div>
      <p class="card-desc">${this.escapeHtml(b.description || '暂无描述')}</p>
      <div class="card-footer">
        <span class="card-link" style="color: var(--text-muted); cursor: not-allowed;">🔒 私有内容</span>
        ${actionHtml}
      </div>
      </div>`;
    }
    return `<div class="bookmark-card ${b.pinned ? 'pinned' : ''} ${b.isPrivate ? 'private' : ''}" data-id="${b.id}" ${clickEvent}>
      <div class="card-header"><h3 class="card-title">${this.escapeHtml(b.title)}</h3>
        <div class="card-badges">${b.pinned ? '<span class="badge badge-pinned">📌</span>' : ''}${b.isPrivate ? '<span class="badge badge-private">🔒</span>' : ''}<span class="badge badge-category" style="border-color: ${categoryColor}33; color: ${categoryColor}">${this.escapeHtml(b.category || '未分类')}</span></div>
      </div>
      <p class="card-desc">${this.escapeHtml(b.description || '暂无描述')}</p>
      <div class="card-footer">
        <a href="${this.escapeHtml(b.url)}" target="_blank" rel="noopener noreferrer" class="card-link" onclick="event.stopPropagation()">🌐 ${this.truncateUrl(b.url)}</a>
        ${actionHtml}
      </div>
      </div>`;
  }
  renderCategories() {
    const list = document.getElementById('categoryList');
    const counts = {};
    this.bookmarks.forEach(b => {
      if (!counts[b.category]) counts[b.category] = 0;
      counts[b.category] += 1;
    });
    list.innerHTML = this.categories.map(cat => {
      const color = this.getCategoryColor(cat);
      const isActive = this.currentView === cat;
      const itemCount = counts[cat] || 0;
      const disableDel = cat === '未分类' || itemCount > 0;
      let delTip = '';
      if (cat === '未分类') {
        delTip = '默认分类不可删除';
      } else if (itemCount > 0) {
        delTip = `该分类下存在${itemCount}个书签，无法删除`;
      } else {
        delTip = '删除此空分类';
      }
      return `<div class="category-item ${isActive ? 'active' : ''}" draggable="true" data-cat="${this.escapeHtml(cat)}"
        ondragstart="app.handleDragStart(event)"
        ondragover="app.handleDragOver(event)"
        ondragleave="app.handleDragLeave(event)"
        ondrop="app.handleDrop(event)"
        ondragend="app.handleDragEnd(event)">
        <span class="cat-color" style="background: ${color}"></span>
        <span class="cat-text" onclick="event.stopPropagation();app.setView('${this.escapeHtml(cat)}')">${this.escapeHtml(cat)}</span>
        <span class="cat-count">${itemCount}</span>
        <button class="cat-del-btn" title="${this.escapeHtml(delTip)}" onclick="event.stopPropagation();app.deleteCategory('${this.escapeHtml(cat)}')" ${disableDel ? 'disabled style="opacity:0.3;cursor:not-allowed"' : ''}>×</button>
      </div>`;
    }).join('');
    const select = document.getElementById('formCategory');
    select.innerHTML = this.categories.map(cat => `<option value="${this.escapeHtml(cat)}">${this.escapeHtml(cat)}</option>`).join('');
  }
  handleDragStart(e) {
    this.dragItem = e.target;
    e.target.style.opacity = '0.4';
    e.dataTransfer.setData('text/plain', e.target.dataset.cat);
  }
  handleDragEnd(e) {
    e.target.style.opacity = '1';
    this.dragItem = null;
    document.querySelectorAll('.category-item').forEach(el=>el.style.background='');
  }
  handleDragOver(e) {
    e.preventDefault();
    if(e.target.classList.contains('category-item') && e.target !== this.dragItem) {
      e.target.style.background = 'rgba(255,255,255,0.15)';
    }
  }
  handleDragLeave(e) {
    if(e.target.classList.contains('category-item')) e.target.style.background='';
  }
  async handleDrop(e) {
    e.preventDefault();
    const dropEl = e.target.closest('.category-item');
    if(!dropEl || dropEl === this.dragItem) return;
    const dragName = this.dragItem.dataset.cat;
    const dropName = dropEl.dataset.cat;
    if(dragName === dropName) return;
    const arr = [...this.categories];
    const dragIdx = arr.indexOf(dragName);
    const dropIdx = arr.indexOf(dropName);
    arr.splice(dragIdx,1);
    arr.splice(dropIdx,0,dragName);
    this.categories = arr;
    await this.saveCategoryOrder();
    this.renderCategories();
  }
  async saveCategoryOrder() {
    if(!this.isAuthenticated) {
      this.showToast('请先验证身份', 'error');
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/categories/sort`, {
        method:'PUT',
        headers: this.authHeaders(),
        body: JSON.stringify({ list: this.categories })
      });
      if(!res.ok) throw new Error('排序保存失败');
    } catch(err) {
      this.showToast(err.message, 'error');
    }
  }
  async deleteCategory(name) {
    if(!this.isAuthenticated) {
      this.showToast('请先验证身份', 'error');
      this.toggleAuth();
      return;
    }
    if(name === '未分类') {
      this.showToast('默认分类「未分类」禁止删除', 'error');
      return;
    }
    const hasBookmark = this.bookmarks.some(b=>b.category === name);
    if(hasBookmark) {
      this.showToast(`分类「${name}」下存在书签，请先清空书签`, 'error');
      return;
    }
    if(!confirm(`确定删除空分类「${name}」？`)) return;
    try {
      const res = await fetch(`${API_BASE}/${encodeURIComponent(name)}`, {
        method:'DELETE',
        headers: this.authHeaders()
      });
      if(res.status === 401) {
        this.showToast('身份失效，请重新验证', 'error');
        this.toggleAuth();
        return;
      }
      if(!res.ok) throw new Error('删除失败');
      this.showToast('分类已删除', 'success');
      await this.loadData();
      this.renderCategories();
      this.renderBookmarks();
    } catch(e) {
      this.showToast(e.message, 'error');
    }
  }
  getCategoryColor(category) {
    const colors = ['#4361ee', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#f72585', '#14b8a6'];
    let hash = 0;
    for (let i = 0; i < category.length; i++) hash = category.charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
  }
  showAddModal() {
    if(!this.isAuthenticated){
      this.showToast('请先验证身份后添加书签','error');
      this.toggleAuth();
      return;
    }
    document.getElementById('bookmarkForm').reset();
    document.getElementById('bookmarkId').value = '';
    document.getElementById('modalTitle').textContent = '新建书签';
    document.getElementById('bookmarkModal').classList.add('open');
    document.getElementById('formTitle').focus();
  }
  editBookmark(id) {
    const b = this.bookmarks.find(x => x.id === id);
    if (!b) return;
    document.getElementById('bookmarkId').value = b.id;
    document.getElementById('formTitle').value = b.title;
    document.getElementById('formUrl').value = b.url;
    document.getElementById('formDesc').value = b.description || '';
    document.getElementById('formCategory').value = b.category || '未分类';
    document.getElementById('formPinned').checked = b.pinned;
    document.getElementById('formPrivate').checked = b.isPrivate;
    document.getElementById('modalTitle').textContent = '编辑书签';
    document.getElementById('bookmarkModal').classList.add('open');
  }
  closeModalByOverlay(e) { if(e.target.id === 'bookmarkModal') this.closeModal(); }
  closeAuthModalByOverlay(e) { if(e.target.id === 'authModal') this.closeAuthModal(); }
  closeCategoryModalByOverlay(e) { if(e.target.id === 'categoryModal') this.closeCategoryModal(); }
  closeDeleteModalByOverlay(e) { if(e.target.id === 'deleteModal') this.closeDeleteModal(); }
  closeModal() { document.getElementById('bookmarkModal').classList.remove('open'); }
  async saveBookmark() {
    if (!this.isAuthenticated) { this.showToast('请先验证', 'error'); this.toggleAuth(); return; }
    const id = document.getElementById('bookmarkId').value;
    const title = document.getElementById('formTitle').value.trim();
    const url = document.getElementById('formUrl').value.trim();
    const description = document.getElementById('formDesc').value.trim();
    const category = document.getElementById('formCategory').value;
    const pinned = document.getElementById('formPinned').checked;
    const isPrivate = document.getElementById('formPrivate').checked;
    if (!title || !url) { this.showToast('请填写标题和链接', 'error'); return; }
    const data = { title, url, description, category, pinned, isPrivate };
    try {
      const res = await fetch(API_BASE + '/bookmarks' + (id ? '/' + id : ''), {
        method: id ? 'PUT' : 'POST',
        headers: this.authHeaders(),
        body: JSON.stringify(data)
      });
      if (res.status === 401) { this.showToast('身份失效', 'error'); this.toggleAuth(); return; }
      if (!res.ok) throw new Error('保存失败');
      this.showToast(id ? '更新成功' : '创建成功', 'success');
      this.closeModal();
      await this.loadData();
      this.renderCategories();
      this.renderBookmarks();
    } catch (e) { this.showToast(e.message, 'error'); }
  }
  deleteBookmark(id) { this.deleteTarget = id; document.getElementById('deleteModal').classList.add('open'); }
  closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); this.deleteTarget = null; }
  async confirmDelete() {
    if (!this.isAuthenticated) { this.showToast('请先验证', 'error'); this.toggleAuth(); return; }
    if (!this.deleteTarget) return;
    try {
      const res = await fetch(API_BASE + '/bookmarks/' + this.deleteTarget, { method: 'DELETE', headers: this.authHeaders() });
      if (res.status === 401) { this.showToast('身份失效', 'error'); this.toggleAuth(); return; }
      if (!res.ok) throw new Error('删除失败');
      this.showToast('书签已删除', 'success');
      this.closeDeleteModal();
      await this.loadData();
      this.renderCategories();
      this.renderBookmarks();
    } catch (e) { this.showToast(e.message, 'error'); }
  }
  showAddCategory() {
    if(!this.isAuthenticated){
      this.showToast('请先验证身份', 'error');
      this.toggleAuth();
      return;
    }
    document.getElementById('newCategoryName').value = '';
    document.getElementById('categoryModal').classList.add('open');
    document.getElementById('newCategoryName').focus();
  }
  closeCategoryModal() { document.getElementById('categoryModal').classList.remove('open'); }
  async addCategory() {
    if (!this.isAuthenticated) { this.showToast('请先验证', 'error'); return; }
    const name = document.getElementById('newCategoryName').value.trim();
    if (!name) return;
    if (this.categories.includes(name)) { this.showToast('分类已存在', 'error'); return; }
    try {
      const res = await fetch(API_BASE + '/categories', {
        method: 'POST',
        headers: this.authHeaders(),
        body: JSON.stringify({ name })
      });
      const json = await res.json();
      if (res.status === 401) { this.showToast('身份失效', 'error'); this.toggleAuth(); return; }
      if (!res.ok) throw new Error(json.error || '创建失败');
      this.showToast('分类创建成功', 'success');
      this.closeCategoryModal();
      await this.loadData();
      this.renderCategories();
    } catch (e) { this.showToast(e.message, 'error'); }
  }
  toggleAuth() {
    if (this.isAuthenticated) { this.logout(); }
    else {
      document.getElementById('authPassword').value = '';
      document.getElementById('authError').textContent = '';
      document.getElementById('authModal').classList.add('open');
      document.getElementById('authPassword').focus();
    }
  }
  closeAuthModal() { document.getElementById('authModal').classList.remove('open'); }
  async doAuth() {
    const password = document.getElementById('authPassword').value;
    try {
      const res = await fetch(API_BASE + '/auth', {
        method: 'POST',
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.success) {
        this.authToken = data.token;
        this.isAuthenticated = true;
        localStorage.setItem('bookmark_auth', this.authToken);
        this.showToast('验证成功', 'success');
        this.closeAuthModal();
        this.updateAuthUI();
        await this.loadData();
        this.renderBookmarks();
      } else {
        document.getElementById('authError').textContent = '密码错误';
      }
    } catch (e) {
      document.getElementById('authError').textContent = '验证请求失败';
    }
  }
  logout() {
    this.authToken = ''; this.isAuthenticated = false;
    localStorage.removeItem('bookmark_auth');
    this.updateAuthUI();
    this.loadData().then(() => {
        this.renderCategories();
        this.renderBookmarks();
    });
    this.showToast('已退出验证', 'info');
  }
  updateAuthUI() {
    const icon = document.getElementById('authIcon');
    const status = document.getElementById('authStatus');
    const addCatBtn = document.getElementById('addCategoryBtn');
    const navPrivate = document.getElementById('navPrivate');
    const fabBtn = document.getElementById('fabAddBtn');
    if (this.isAuthenticated) {
      icon.textContent = '🔓';
      status.textContent = '已验证';
      if (addCatBtn) addCatBtn.style.display = 'flex';
      navPrivate.style.display = 'flex';
      if(fabBtn) fabBtn.style.display = 'flex';
    } else {
      icon.textContent = '🔒';
      status.textContent = '未验证';
      if (addCatBtn) addCatBtn.style.display = 'none';
      navPrivate.style.display = 'none';
      if(fabBtn) fabBtn.style.display = 'none';
    }
  }
  showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    let icon = 'ℹ️';
    if (type === 'success') icon = '✅';
    if (type === 'error') icon = '❌';
    toast.innerHTML = `<span>${icon}</span> ${this.escapeHtml(message)}`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
  escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  truncateUrl(url) {
    try {
      const u = new URL(url);
      const host = u.hostname;
      const path = u.path;
      if (path.length <= 20) return host + path;
      return host + path.slice(0, 20) + '...';
    } catch {
      if (url.length > 30) return url.slice(0, 30);
      return url;
    }
  }
}
const app = new BookmarkApp();
</script>
</body>
</html>
